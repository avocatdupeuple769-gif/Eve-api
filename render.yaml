services:
  - type: web
    name: eve-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: bash render-build.sh
    startCommand: bash render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
