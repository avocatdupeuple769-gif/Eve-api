services:
  - type: web
    name: eve-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
